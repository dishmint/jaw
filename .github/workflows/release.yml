name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-lsp:
    name: Build jaw-lsp (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build jaw-lsp
        run: cargo build --release --target ${{ matrix.target }} -p jaw-lsp

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf dist/jaw-lsp-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release jaw-lsp
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          mkdir dist
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/jaw-lsp.exe `
            -DestinationPath dist/jaw-lsp-${{ matrix.target }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaw-lsp-${{ matrix.target }}
          path: dist/*

  build-vsix:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Build extension
        working-directory: editors/vscode
        run: npm run build

      - name: Package VSIX
        working-directory: editors/vscode
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: editors/vscode/*.vsix

  release:
    name: Create GitHub Release
    needs: [build-lsp, build-vsix]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.vsix" \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
